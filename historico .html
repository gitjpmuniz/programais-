<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histórico de Relatórios</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f4f6;
    }

    header {
        background: #4f46e5;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
    }

    .container {
        display: flex;
        height: calc(100vh - 60px);
    }

    /* Lista lateral */
    .sidebar {
        width: 280px;
        background: #ffffff;
        border-right: 1px solid #ddd;
        overflow-y: auto;
        padding: 15px;
    }

    .item-relatorio {
        padding: 12px;
        margin-bottom: 10px;
        background: #e5e7eb;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
    }

    .item-relatorio:hover {
        background: #d1d5db;
    }

    .item-relatorio.active {
        background: #c7d2fe;
        font-weight: bold;
    }

    /* Área de conteúdo */
    .content {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
    }

    .box {
        background: #fff;
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
        border: 1px solid #ccc;
    }

    .btn {
        padding: 10px 15px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-right: 10px;
    }

    .btn:hover {
        background: #4338ca;
    }

    pre {
        background: #111827;
        color: #f9fafb;
        padding: 15px;
        border-radius: 6px;
        overflow-x: auto;
    }
</style>
</head>

<body>

<header>Histórico de Relatórios</header>

<div class="container">

    <!-- LISTA DE RELATÓRIOS (RF16) -->
    <aside class="sidebar">
        <h3>Relatórios Antigos</h3>

        <div class="item-relatorio" onclick="abrirRelatorio(0)">📄 Relatório - Versão 1</div>
        <div class="item-relatorio" onclick="abrirRelatorio(1)">📄 Relatório - Versão 2</div>
        <div class="item-relatorio" onclick="abrirRelatorio(2)">📄 Relatório - Versão 3</div>
        <div class="item-relatorio" onclick="abrirRelatorio(3)">📄 Relatório - Versão 4</div>
    </aside>

    <!-- ÁREA PRINCIPAL DE EXIBIÇÃO (RF11 + RF12 + RF15) -->
    <section class="content" id="conteudo">
        <h2>Selecione um relatório à esquerda</h2>
        <p>O conteúdo aparecerá aqui.</p>
    </section>

</div>

<script>
    // Simulação de relatórios (RF11)
    const relatorios = [
        {
            titulo: "Relatório - Versão 1",
            texto: "Correções básicas de formatação ABNT.\nMelhorias sugeridas no resumo e introdução."
        },
        {
            titulo: "Relatório - Versão 2",
            texto: "Ajustes de referências conforme ABNT NBR 6023.\nCorreções ortográficas detectadas."
        },
        {
            titulo: "Relatório - Versão 3",
            texto: "Título reorganizado.\nSugestão: melhorar a fundamentação teórica."
        },
        {
            titulo: "Relatório - Versão 4",
            texto: "Normas atualizadas.\nRelatório revisado com nova versão do modelo de IA."
        }
    ];

    // Função para abrir um relatório (RF11)
    function abrirRelatorio(index) {
        const conteudo = document.getElementById("conteudo");

        // Marca o item ativo
        document.querySelectorAll(".item-relatorio").forEach(el => el.classList.remove("active"));
        document.querySelectorAll(".item-relatorio")[index].classList.add("active");

        // Exibe conteúdo
        conteudo.innerHTML = `
            <div class='box'>
                <h2>${relatorios[index].titulo}</h2>
                <pre>${relatorios[index].texto}</pre>
            </div>

            <button class='btn' onclick='reprocessar(${index})'>🔄 Reprocessar (RF12)</button>
            <button class='btn' onclick='abrirChat(${index})'>💬 Ver Chat com IA (RF15)</button>
        `;
    }

    // Função simulada de reprocessamento (RF12)
    function reprocessar(index) {
        alert("Seu TCC será reprocessado!\n(Exemplo simulado)");
    }

    // Função simulada para abrir chat anterior (RF15)
    function abrirChat(index) {
        alert("Abrindo chat relacionado ao relatório...\n(Exemplo simulado)");
    }
</script>

</body>
</html>
